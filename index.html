<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carldle</title>
    <style>
        :root {
            --bg-color: #140a28;
            --text-color: #fff5dc;
            --primary-pink: #ff64b4;
            --accent-purple: #c8a0ff;
            --cell-bg: #281946;
            --cell-border: #645096;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: var(--primary-pink); margin: 20px 0 5px; font-size: 2.5rem; }
        .sub { color: var(--accent-purple); margin-bottom: 20px; font-size: 1rem; }

        /* GRILLA RESPONSIVA */
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 55px); /* Tamaño fijo para compu */
            grid-template-rows: repeat(6, 55px);
            gap: 8px;
            margin: 10px auto;
        }

        /* Ajuste para celulares */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(6, 13vw);
                grid-template-rows: repeat(6, 13vw);
                gap: 5px;
            }
        }

        .cell {
            width: 100%;
            height: 100%;
            background: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 6px;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        /* Colores de estado */
        .correct { background: #50c878 !important; border-color: #50c878; color: white; }
        .present { background: #ffbe32 !important; border-color: #ffbe32; color: white; }
        .absent { background: #504664 !important; border-color: #504664; color: #ccc; }

        /* TECLADO */
        .keyboard {
            margin: 25px auto;
            width: 100%;
            max-width: 500px;
            padding: 0 10px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .key {
            min-width: 35px;
            height: 50px;
            margin: 3px;
            background: #37285a;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            flex: 1;
        }

        .key.wide { flex: 1.5; font-size: 0.8rem; background: #645096; }

        /* PANTALLA FINAL MEJORADA */
        #victory {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 25, 0.98);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        #victory img { 
            max-width: 300px; 
            width: 80%;
            border-radius: 15px; 
            margin-bottom: 20px; 
            display: none;
            box-shadow: 0 0 30px rgba(255, 100, 180, 0.3);
        }

        .resultado-mensaje {
            padding: 20px;
            font-size: 1.3rem;
            max-width: 80%;
        }

        button { 
            padding: 15px 30px; 
            font-size: 1.1rem; 
            font-weight: bold;
            border-radius: 12px; 
            background: var(--primary-pink); 
            color: white; 
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<h1>Carldle</h1>
<div class="sub">el que no la saca no come torta</div>

<div id="grid" class="grid"></div>
<div id="message" style="height: 25px; color: var(--primary-pink); margin: 10px 0; font-weight: bold;"></div>
<div id="keyboard" class="keyboard"></div>

<div id="victory">
    <img id="img-invitacion" src="invitation.png" alt="Invitación">
    <div id="resultado-texto" class="resultado-mensaje"></div>
    <button onclick="location.reload()">VOLVER A INTENTAR</button>
</div>

<canvas id="confetti" style="position:fixed; top:0; left:0; pointer-events:none;"></canvas>

<script>
    const PALABRAS = ["PANCHO", "FERNET", "MUSICA", "CUMPLE", "FIESTA", "CARLOS"];
    let palabra = PALABRAS[Math.floor(Math.random() * PALABRAS.length)].toUpperCase();
    let intentoActual = "";
    let intentos = [];
    let terminado = false;

    // Crear Grilla
    const grid = document.getElementById("grid");
    for (let i = 0; i < 36; i++) {
        let d = document.createElement("div");
        d.className = "cell";
        grid.appendChild(d);
    }

    // Crear Teclado
    const filas = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    const keyboardDiv = document.getElementById("keyboard");

    filas.forEach((fila, idx) => {
        let row = document.createElement("div");
        row.className = "keyboard-row";

        if (idx === 2) {
            let enter = document.createElement("span");
            enter.className = "key wide";
            enter.textContent = "ENTER";
            enter.onclick = () => manejarInput("Enter");
            row.appendChild(enter);
        }

        for (let l of fila) {
            let k = document.createElement("span");
            k.className = "key";
            k.textContent = l;
            k.id = "k_" + l;
            k.onclick = () => manejarInput(l);
            row.appendChild(k);
        }

        if (idx === 2) {
            let del = document.createElement("span");
            del.className = "key wide";
            del.textContent = "BORRAR";
            del.onclick = () => manejarInput("Backspace");
            row.appendChild(del);
        }
        keyboardDiv.appendChild(row);
    });

    function manejarInput(tecla) {
        if (terminado) return;

        if (tecla === "Backspace") {
            intentoActual = intentoActual.slice(0, -1);
        } else if (tecla === "Enter") {
            if (intentoActual.length < 6) {
                document.getElementById("message").textContent = "¡Faltan letras!";
                setTimeout(() => document.getElementById("message").textContent = "", 2000);
                return;
            }
            procesarIntento();
        } else if (intentoActual.length < 6 && /^[a-zA-ZñÑ]$/.test(tecla)) {
            intentoActual += tecla.toUpperCase();
        }
        actualizarVisuals();
    }

    window.addEventListener("keydown", (e) => manejarInput(e.key));

    function procesarIntento() {
        let res = Array(6).fill("absent");
        let count = {};
        for (let c of palabra) count[c] = (count[c] || 0) + 1;

        for (let i = 0; i < 6; i++) {
            if (intentoActual[i] === palabra[i]) {
                res[i] = "correct";
                count[intentoActual[i]]--;
            }
        }
        for (let i = 0; i < 6; i++) {
            if (res[i] !== "correct" && count[intentoActual[i]] > 0) {
                res[i] = "present";
                count[intentoActual[i]]--;
            }
        }

        intentos.push({ palabra: intentoActual, res: res });

        res.forEach((r, i) => {
            let key = document.getElementById("k_" + intentoActual[i]);
            if (!key) return;
            if (r === "correct") key.className = "key correct";
            else if (r === "present" && !key.classList.contains("correct")) key.className = "key present";
            else if (r === "absent" && !key.classList.contains("correct") && !key.classList.contains("present")) key.className = "key absent";
        });

        if (intentoActual === palabra) final(true);
        else if (intentos.length >= 6) final(false);

        intentoActual = "";
    }

    function actualizarVisuals() {
        let cells = document.querySelectorAll(".cell");
        cells.forEach(c => { c.textContent = ""; if(!c.classList.contains('correct') && !c.classList.contains('present') && !c.classList.contains('absent')) c.className = "cell"; });

        intentos.forEach((int, f) => {
            for (let i = 0; i < 6; i++) {
                let idx = f * 6 + i;
                cells[idx].textContent = int.palabra[i];
                cells[idx].className = "cell " + int.res[i];
            }
        });

        let fActual = intentos.length;
        if (fActual < 6) {
            for (let i = 0; i < intentoActual.length; i++) {
                cells[fActual * 6 + i].textContent = intentoActual[i];
            }
        }
    }

    function final(gana) {
        terminado = true;
        const pantallaFinal = document.getElementById("victory");
        const imagen = document.getElementById("img-invitacion");
        const texto = document.getElementById("resultado-texto");

        setTimeout(() => {
            pantallaFinal.style.display = "flex";
            if (gana) {
                imagen.style.display = "block";
                texto.innerHTML = "<h2 style='color:#50c878'>GANASTE, CRACK. te mereces la invitación</h2><p>Lo lograste. Aquí tienes los detalles de la fiesta:</p>";
                iniciarConfetti();
            } else {
                imagen.style.display = "none";
                texto.innerHTML = "<h2 style='color:#ff4b4b'>MALISIMO como vas a perder asiii. Jugá de vuelta dale, asi sabes donde es.</h2><p>No pudiste adivinar. La palabra era <strong>" + palabra + "</strong>.</p><p>¡Inténtalo de nuevo para ver la invitación!</p>";
            }
        }, 500);
    }

    function iniciarConfetti() {
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = Array.from({length: 150}, () => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height - canvas.height,
            s: Math.random()*6 + 4, d: Math.random()*4 + 2, c: `hsl(${Math.random()*360}, 80%, 60%)`
        }));
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.d; if(p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s);
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
