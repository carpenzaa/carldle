<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carldle</title>
    <style>
        body {
            margin: 0;
            background: #140a28;
            color: #fff5dc;
            font-family: sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        h1 { color: #ff64b4; margin-top: 10px; font-size: 2rem; }
        .sub { color: #c8a0ff; margin-bottom: 10px; font-size: 0.9rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 15vw);
            grid-template-rows: repeat(6, 15vw);
            gap: 5px;
            justify-content: center;
            margin: 10px auto;
            max-width: 400px;
        }

        .cell {
            width: 100%;
            height: 100%;
            background: #281946;
            border: 2px solid #645096;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .correct { background: #50c878 !important; border-color: #50c878; }
        .present { background: #ffbe32 !important; border-color: #ffbe32; }
        .absent { background: #504664 !important; border-color: #504664; }

        .keyboard {
            margin: 20px auto;
            padding: 0 5px;
            max-width: 500px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .key {
            min-width: 8vw;
            height: 45px;
            margin: 2px;
            background: #37285a;
            border-radius: 4px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }

        .key.wide { min-width: 15vw; background: #645096; font-size: 0.7rem; }

        #victory {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }

        #victory img { max-width: 70%; border-radius: 15px; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 1rem; border-radius: 10px; background: #ff64b4; color: white; border: none; }
    </style>
</head>
<body>

<h1>Carldle</h1>
<div class="sub">el que no la saca no come torta</div>

<div id="grid" class="grid"></div>
<div id="keyboard" class="keyboard"></div>
<div id="message" style="height: 20px; color: #ff64b4; margin-bottom: 10px;"></div>

<div id="victory">
    <img src="invitation.png" alt="Invitación">
    <h2 id="resultado-texto" style="padding: 0 20px;"></h2>
    <button onclick="location.reload()">Jugar de nuevo</button>
</div>

<canvas id="confetti" style="position:fixed; top:0; left:0; pointer-events:none;"></canvas>

<script>
    const PALABRAS = ["PANCHO", "FERNET", "MUSICA", "CUMPLE", "FIESTA"];
    let palabra = PALABRAS[Math.floor(Math.random() * PALABRAS.length)];
    let intentoActual = "";
    let intentos = [];
    let terminado = false;

    const grid = document.getElementById("grid");
    const message = document.getElementById("message");

    // Crear Grilla
    for (let i = 0; i < 36; i++) {
        let d = document.createElement("div");
        d.className = "cell";
        grid.appendChild(d);
    }

    // Crear Teclado
    const filas = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    const keyboardDiv = document.getElementById("keyboard");

    filas.forEach((fila, idx) => {
        let row = document.createElement("div");
        row.className = "keyboard-row";

        if (idx === 2) { // Fila de abajo con Enter y Borrar
            let enter = document.createElement("span");
            enter.className = "key wide";
            enter.textContent = "ENTER";
            enter.onclick = () => manejarInput("Enter");
            row.appendChild(enter);
        }

        for (let l of fila) {
            let k = document.createElement("span");
            k.className = "key";
            k.textContent = l;
            k.id = "k_" + l;
            k.onclick = () => manejarInput(l);
            row.appendChild(k);
        }

        if (idx === 2) {
            let del = document.createElement("span");
            del.className = "key wide";
            del.textContent = "BORRAR";
            del.onclick = () => manejarInput("Backspace");
            row.appendChild(del);
        }
        keyboardDiv.appendChild(row);
    });

    function manejarInput(tecla) {
        if (terminado) return;

        if (tecla === "Backspace") {
            intentoActual = intentoActual.slice(0, -1);
        } else if (tecla === "Enter") {
            if (intentoActual.length < 6) {
                message.textContent = "¡Faltan letras!";
                return;
            }
            procesarIntento();
        } else if (intentoActual.length < 6 && tecla.length === 1) {
            intentoActual += tecla.toUpperCase();
            message.textContent = "";
        }
        actualizarVisuals();
    }

    // Soporte para teclado físico también
    window.addEventListener("keydown", (e) => manejarInput(e.key));

    function procesarIntento() {
        let res = Array(6).fill("absent");
        let count = {};
        for (let c of palabra) count[c] = (count[c] || 0) + 1;

        for (let i = 0; i < 6; i++) {
            if (intentoActual[i] === palabra[i]) {
                res[i] = "correct";
                count[intentoActual[i]]--;
            }
        }
        for (let i = 0; i < 6; i++) {
            if (res[i] !== "correct" && count[intentoActual[i]] > 0) {
                res[i] = "present";
                count[intentoActual[i]]--;
            }
        }

        intentos.push({ palabra: intentoActual, res: res });

        // Pintar teclado
        res.forEach((r, i) => {
            let key = document.getElementById("k_" + intentoActual[i]);
            if (r === "correct") key.className = "key correct";
            else if (r === "present" && !key.classList.contains("correct")) key.className = "key present";
            else if (r === "absent" && !key.classList.contains("correct") && !key.classList.contains("present")) key.className = "key absent";
        });

        if (intentoActual === palabra) final(true);
        else if (intentos.length >= 6) final(false);

        intentoActual = "";
    }

    function actualizarVisuals() {
        let cells = document.querySelectorAll(".cell");
        cells.forEach(c => { c.textContent = ""; c.className = "cell"; });

        intentos.forEach((int, f) => {
            for (let i = 0; i < 6; i++) {
                let idx = f * 6 + i;
                cells[idx].textContent = int.palabra[i];
                cells[idx].classList.add(int.res[i]);
            }
        });

        let filaActual = intentos.length;
        if (filaActual < 6) {
            for (let i = 0; i < intentoActual.length; i++) {
                cells[filaActual * 6 + i].textContent = intentoActual[i];
            }
        }
    }

    function final(gana) {
        terminado = true;
        document.getElementById("victory").style.display = "flex";
        document.getElementById("resultado-texto").innerHTML = gana ? "¡GANASTE! 🎉" : "Perdiste... <br>Era: " + palabra;
        if (gana) iniciarConfetti();
    }

    // Lógica simple de confetti
    function iniciarConfetti() {
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = Array.from({length: 100}, () => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height - canvas.height,
            s: 5+Math.random()*5, d: 2+Math.random()*3, c: `hsl(${Math.random()*360}, 70%, 50%)`
        }));
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.d; if(p.y > canvas.height) p.y = -10;
                ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s);
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
