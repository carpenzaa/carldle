<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carldle</title>

<style>
body {
    margin: 0;
    background: #140a28;
    color: #fff5dc;
    font-family: sans-serif;
    text-align: center;
}

h1 {
    color: #ff64b4;
    margin-top: 10px;
}

.sub {
    color: #c8a0ff;
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(6, 58px);
    gap: 6px;
    justify-content: center;
    margin: 20px;
}

.cell {
    width: 58px;
    height: 58px;
    background: #281946;
    border: 2px solid #645096;
    border-radius: 10px;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.correct { background: #50c878; }
.present { background: #ffbe32; }
.absent { background: #504664; }

.keyboard {
    margin-top: 15px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
}

.keyboard-row {
    display: flex;
    justify-content: center;
    margin-bottom: 5px;
}

.key {
    width: 32px;
    height: 40px;
    margin: 3px;
    line-height: 40px;
    background: #37285a;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

#victory {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#victory img {
    max-width: 80%;
    max-height: 80%;
    border-radius: 20px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #ff64b4;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Carldle</h1>
<div class="sub">el que no la saca no come torta</div>

<div id="grid" class="grid"></div>
<div id="keyboard" class="keyboard"></div>
<div id="message"></div>

<canvas id="confetti"></canvas>

<div id="victory">
    <img src="invitation.png">
    <h2 id="resultado-texto"></h2>
    <button onclick="location.reload()">Jugar de nuevo</button>
</div>

<script>
const PALABRAS = ["PANCHO","FERNET","MUSICA","CUMPLE","FIESTA"];
let palabra = PALABRAS[Math.floor(Math.random()*PALABRAS.length)];

let intentoActual = "";
let intentos = [];
let terminado = false;

const grid = document.getElementById("grid");
const message = document.getElementById("message");

// GRILLA
for (let i=0;i<36;i++){
    let d=document.createElement("div");
    d.className="cell";
    grid.appendChild(d);
}

// TECLADO
const filas = [
    "QWERTYUIOP",
    "ASDFGHJKL",
    "ZXCVBNM"
];

const keyboardDiv = document.getElementById("keyboard");

filas.forEach(fila => {
    let row = document.createElement("div");
    row.className = "keyboard-row";

    for (let l of fila){
        let k = document.createElement("span");
        k.className = "key";
        k.textContent = l;
        k.id = "k_" + l;
        row.appendChild(k);
    }

    keyboardDiv.appendChild(row);
});

// EVALUAR
function evaluar(intento, palabra){
    let res = Array(6).fill("absent");
    let count={};

    for (let c of palabra){
        count[c]=(count[c]||0)+1;
    }

    for (let i=0;i<6;i++){
        if(intento[i]===palabra[i]){
            res[i]="correct";
            count[intento[i]]--;
        }
    }

    for (let i=0;i<6;i++){
        if(res[i]!=="correct" && count[intento[i]]>0){
            res[i]="present";
            count[intento[i]]--;
        }
    }

    return res;
}

// INPUT
window.addEventListener("keydown", e=>{
    if(terminado) return;

    if(e.key==="Backspace"){
        intentoActual=intentoActual.slice(0,-1);
    }
    else if(e.key==="Enter"){
        if(intentoActual.length<6){
            message.textContent="¡Faltan letras!";
            return;
        }

        let res=evaluar(intentoActual,palabra);
        intentos.push({palabra:intentoActual,res});

        res.forEach((r,i)=>{
            let l=intentoActual[i];
            let key=document.getElementById("k_"+l);
            key.className="key "+r;
        });

        if(intentoActual===palabra){
            ganar();
        }
        else if(intentos.length>=6){
            message.textContent = "Era " + palabra;

            const v = document.getElementById("victory");
            v.style.display = "flex";

            document.getElementById("resultado-texto").textContent =
            "Perdiste, burro - Era " + palabra;

            terminado = true;
}

        v.innerHTML = `
            <h2 style="color:white;">Perdiste, burro </h2>
            <p>La palabra era ${palabra}</p>
            <button onclick="location.reload()">Jugar de nuevo</button>
    `   ;

    terminado = true;
}

        intentoActual="";
    }
    else if(/^[a-zA-Z]$/.test(e.key) && intentoActual.length<6){
        intentoActual+=e.key.toUpperCase();
    }

    actualizar();
});

// UPDATE
function actualizar(){
    let cells=document.querySelectorAll(".cell");

    cells.forEach(c=>{
        c.textContent="";
        c.className="cell";
    });

    intentos.forEach((int,f)=>{
        for(let i=0;i<6;i++){
            let idx=f*6+i;
            cells[idx].textContent=int.palabra[i];
            cells[idx].classList.add(int.res[i]);
        }
    });

    let f=intentos.length;
    for(let i=0;i<intentoActual.length;i++){
        cells[f*6+i].textContent=intentoActual[i];
    }
}

// VICTORIA
function ganar(){
    terminado = true;

    const v = document.getElementById("victory");
    v.style.display = "flex";

    document.getElementById("resultado-texto").textContent = "GANASTE 🎉";

    iniciarConfetti();
}

// CONFETTI
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function crearConfetti(){
    for(let i=0;i<100;i++){
        confetti.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height-500,
            size:5+Math.random()*8,
            speed:2+Math.random()*3,
            color:`hsl(${Math.random()*360},100%,60%)`
        });
    }
}

function iniciarConfetti(){
    crearConfetti();
    requestAnimationFrame(animar);
}

function animar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    confetti.forEach(c=>{
        c.y+=c.speed;
        if(c.y>canvas.height) c.y=-10;

        ctx.fillStyle=c.color;
        ctx.fillRect(c.x,c.y,c.size,c.size);
    });

    requestAnimationFrame(animar);
}
</script>

</body>
</html>
