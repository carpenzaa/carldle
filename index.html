<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carldle</title>
    <style>
        :root {
            --bg-color: #140a28;
            --text-color: #fff5dc;
            --pink: #ff64b4;
            --purple: #c8a0ff;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: var(--pink); margin: 15px 0 5px; font-size: 1.8rem; }
        .sub { color: var(--purple); margin-bottom: 15px; font-size: 0.9rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            width: 90%;
            max-width: 340px;
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #281946;
            border: 2px solid #645096;
            border-radius: 6px;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .correct { background: #50c878 !important; border-color: #50c878; }
        .present { background: #ffbe32 !important; border-color: #ffbe32; }
        .absent { background: #504664 !important; border-color: #504664; }

 
        .keyboard {
            margin-top: 20px;
            width: 100%;
            max-width: 450px;
            padding: 0 8px;
            box-sizing: border-box;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }

        .key {
            background: #37285a;
            height: 45px;
            margin: 2px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            touch-action: manipulation;
        }

        .key.wide { flex: 1.8; font-size: 0.7rem; }

        #victory {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 20, 0.98);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #img-invitacion {
            max-width: 280px;
            width: 85%;
            border-radius: 12px;
            display: none;
            margin-bottom: 15px;
        }

        button {
            background: var(--pink);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Carldle</h1>
    <div class="sub">El que no gana no come torta</div>

    <div id="grid" class="grid"></div>
    <div id="message" style="height: 20px; margin: 10px 0; color: var(--pink); font-size: 0.9rem;"></div>
    <div id="keyboard" class="keyboard"></div>

    <div id="victory">
        <img id="img-invitacion" src="invitation.png" alt="Invitación">
        <div id="resultado-texto" style="padding: 15px; line-height: 1.4;"></div>
        <button onclick="location.reload()">REINTENTAR</button>
    </div>

    <canvas id="confetti" style="position:fixed; top:0; left:0; pointer-events:none;"></canvas>

<script>
    const PALABRAS = ["PANCHO", "FERNET", "MUSICA", "CUMPLE", "FIESTA", "JUEGOS", "COMIDA", "SUERTE", "TRAGOS", "VELITA", "DESEOS"];
    let palabra = PALABRAS[Math.floor(Math.random() * PALABRAS.length)].toUpperCase();
    let intentoActual = "";
    let intentos = [];
    let terminado = false;

    const gridDiv = document.getElementById("grid");
    for (let i = 0; i < 36; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";
        gridDiv.appendChild(cell);
    }

    const filas = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    const keyboardDiv = document.getElementById("keyboard");

    filas.forEach((fila, idx) => {
        let row = document.createElement("div");
        row.className = "keyboard-row";

        if (idx === 2) {
            let enter = document.createElement("div");
            enter.className = "key wide";
            enter.textContent = "ENTER";
            enter.onclick = () => manejarInput("Enter");
            row.appendChild(enter);
        }

        for (let l of fila) {
            let k = document.createElement("div");
            k.className = "key";
            k.textContent = l;
            k.id = "k_" + l;
            k.onclick = () => manejarInput(l);
            row.appendChild(k);
        }

        if (idx === 2) {
            let del = document.createElement("div");
            del.className = "key wide";
            del.textContent = "BORRAR";
            del.onclick = () => manejarInput("Backspace");
            row.appendChild(del);
        }
        keyboardDiv.appendChild(row);
    });

    function manejarInput(tecla) {
        if (terminado) return;
        if (tecla === "Backspace") {
            intentoActual = intentoActual.slice(0, -1);
        } else if (tecla === "Enter") {
            if (intentoActual.length < 6) {
                document.getElementById("message").textContent = "¡Faltan letras!";
                return;
            }
            procesarIntento();
        } else if (intentoActual.length < 6 && /^[a-zA-ZñÑ]$/.test(tecla)) {
            intentoActual += tecla.toUpperCase();
            document.getElementById("message").textContent = "";
        }
        actualizarVisuals();
    }

    window.addEventListener("keydown", (e) => manejarInput(e.key));

    function procesarIntento() {
        let res = Array(6).fill("absent");
        let count = {};
        for (let c of palabra) count[c] = (count[c] || 0) + 1;

        for (let i = 0; i < 6; i++) {
            if (intentoActual[i] === palabra[i]) {
                res[i] = "correct";
                count[intentoActual[i]]--;
            }
        }
        for (let i = 0; i < 6; i++) {
            if (res[i] !== "correct" && count[intentoActual[i]] > 0) {
                res[i] = "present";
                count[intentoActual[i]]--;
            }
        }

        intentos.push({ palabra: intentoActual, res: res });

        res.forEach((r, i) => {
            let key = document.getElementById("k_" + intentoActual[i]);
            if (!key) return;
            if (r === "correct") key.className = "key correct";
            else if (r === "present" && !key.classList.contains("correct")) key.className = "key present";
            else if (r === "absent" && !key.classList.contains("correct") && !key.classList.contains("present")) key.className = "key absent";
        });

        if (intentoActual === palabra) final(true);
        else if (intentos.length >= 6) final(false);
        intentoActual = "";
    }

    function actualizarVisuals() {
        let cells = document.querySelectorAll(".cell");
        intentos.forEach((int, f) => {
            for (let i = 0; i < 6; i++) {
                let idx = f * 6 + i;
                cells[idx].textContent = int.palabra[i];
                cells[idx].classList.add(int.res[i]);
            }
        });
        let fActual = intentos.length;
        if (fActual < 6) {
            for (let i = 0; i < 6; i++) {
                let idx = fActual * 6 + i;
                cells[idx].textContent = intentoActual[i] || "";
            }
        }
    }

    function final(gana) {
        terminado = true;
        setTimeout(() => {
            document.getElementById("victory").style.display = "flex";
            const img = document.getElementById("img-invitacion");
            const txt = document.getElementById("resultado-texto");
            if (gana) {
                img.style.display = "block";
                txt.innerHTML = "<h2 style='color:#50c878'>BIEN CRACK</h2><p>Tomá, acá tenés la invitación:</p>";
                iniciarConfetti();
            } else {
                img.style.display = "none";
                txt.innerHTML = "<h2 style='color:#ff4b4b'>PERDISTE, burro, ¿Cómo no la vas a sacar?</h2><p>La palabra era <b>"+palabra+"</b>.<br>Dale, otra vez</p>";
            }
        }, 500);
    }

    function iniciarConfetti() {
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let p = Array.from({length: 100}, () => ({
            x: Math.random()*canvas.width, y: -20,
            s: Math.random()*5+5, d: Math.random()*3+2, c: `hsl(${Math.random()*360}, 70%, 60%)`
        }));
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            p.forEach(part => {
                part.y += part.d;
                ctx.fillStyle = part.c; ctx.fillRect(part.x, part.y, part.s, part.s);
            });
            if(p[0].y < canvas.height) requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
